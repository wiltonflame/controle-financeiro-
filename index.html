<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Controle Financeiro</title>
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#1e3a5f"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Financeiro"/>
<link rel="apple-touch-icon" href="icon-180.png"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --green:#10b981;--red:#ef4444;--blue:#1d4ed8;--navy:#1e3a5f;
  --yellow:#f59e0b;--purple:#8b5cf6;
  --bg:#f0f4ff;--card:#fff;--text:#1f2937;--muted:#6b7280;--border:#e5e7eb;
  --shadow:0 2px 12px rgba(0,0,0,0.07);
}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:linear-gradient(160deg,#f0f4ff 0%,#fafafa 60%,#f5fff9 100%);min-height:100vh;color:var(--text);}

/* ── HEADER ── */
.header{background:linear-gradient(135deg,#1e3a5f 0%,#1d4ed8 100%);padding:max(14px,env(safe-area-inset-top)) 16px 0;box-shadow:0 4px 20px rgba(30,58,95,0.25);position:sticky;top:0;z-index:100;}
.header-inner{max-width:1200px;margin:0 auto;}
.header-top{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:12px;padding-top:4px;}
.header-left{display:flex;align-items:center;gap:12px;}
.header-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:#93c5fd;margin-bottom:2px;}
.header-title{font-size:19px;font-weight:900;color:#fff;font-family:Georgia,serif;}
.year-select{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);color:#fff;border-radius:8px;padding:5px 10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;-webkit-appearance:none;}
.year-select option{background:#1e3a5f;}
.header-btns{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.tabs-wrap{display:flex;gap:2px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.tabs-wrap::-webkit-scrollbar{display:none;}
.tab{background:transparent;color:rgba(255,255,255,0.6);border:none;border-radius:8px 8px 0 0;padding:8px 12px;cursor:pointer;font-size:12px;font-weight:500;white-space:nowrap;flex-shrink:0;transition:all 0.15s;font-family:inherit;-webkit-tap-highlight-color:transparent;}
.tab.active{background:#fff;color:var(--navy);font-weight:700;}
.tab:hover:not(.active){color:#fff;background:rgba(255,255,255,0.12);}

/* ── CONTENT ── */
.content{max-width:1200px;margin:0 auto;padding:20px 16px max(64px,calc(48px + env(safe-area-inset-bottom)));}

/* ── DESKTOP LAYOUT ── */
.desktop-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.desktop-grid .col-full{grid-column:1/-1;}
body.desktop-mode .content{max-width:1200px;}
body.desktop-mode .header-inner{max-width:1200px;}

/* ── CARDS ── */
.cards{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.card{background:var(--card);border-radius:12px;padding:12px 16px;flex:1;min-width:100px;box-shadow:var(--shadow);border-left:4px solid var(--border);}
.card-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:3px;}
.card-value{font-size:16px;font-weight:800;font-family:Georgia,serif;}
.card-sub{font-size:10px;color:var(--muted);margin-top:2px;}

/* ── SECTION TITLE ── */
.section-title{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1px;padding-bottom:6px;margin-bottom:8px;}
.month-title{font-size:20px;font-weight:800;color:var(--navy);margin-bottom:16px;font-family:Georgia,serif;}

/* ── SALDO ANTERIOR ── */
.saldo-ant{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
.saldo-ant label{font-size:13px;font-weight:600;color:var(--muted);white-space:nowrap;}
.saldo-ant input{padding:8px 10px;border-radius:8px;border:1px solid var(--border);font-size:14px;width:160px;font-family:inherit;}
.saldo-ant input:focus{outline:2px solid var(--blue);border-color:var(--blue);}

/* ── ADD FORM ── */
.add-form{border-radius:12px;padding:12px;margin-bottom:10px;}
.add-form-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
.add-form-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.add-form select,.add-form input[type="number"],.add-form input[type="text"]{padding:9px 10px;border-radius:8px;border:1px solid var(--border);font-size:14px;background:#fff;color:var(--text);flex:1;min-width:90px;font-family:inherit;-webkit-appearance:none;}
.add-form select:focus,.add-form input:focus{outline:2px solid var(--blue);border-color:var(--blue);}
.notes-row{margin-top:6px;}
.notes-row input{width:100%;}

/* ── LANÇAMENTOS ── */
.lanc-section{background:var(--card);border-radius:12px;box-shadow:var(--shadow);overflow:hidden;margin-bottom:4px;}
.lanc-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border);}
.lanc-header-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;}
.lanc-header-total{font-size:13px;font-weight:800;}
.lancamento{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid #f9fafb;transition:background 0.1s;}
.lancamento:last-child{border-bottom:none;}
.lancamento:hover{background:#f9fafb;}
.lanc-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.lanc-info{flex:1;min-width:0;}
.lanc-cat{font-size:13px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.lanc-note{font-size:11px;color:var(--muted);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.lanc-meta{font-size:11px;color:var(--muted);}
.lanc-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.lanc-val{font-size:14px;font-weight:800;white-space:nowrap;}
.lanc-del{background:none;border:none;cursor:pointer;color:#d1d5db;font-size:14px;padding:4px 6px;border-radius:4px;line-height:1;transition:color 0.15s;font-family:inherit;flex-shrink:0;}
.lanc-del:hover{color:var(--red);}
.lanc-recurring{font-size:10px;color:var(--purple);margin-left:4px;}
.empty{text-align:center;color:var(--muted);font-size:13px;padding:16px;font-style:italic;}

/* ── GOALS ── */
.goals-wrap{margin-bottom:16px;}
.goal-item{background:var(--card);border-radius:10px;padding:10px 14px;margin-bottom:6px;box-shadow:var(--shadow);}
.goal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;gap:8px;}
.goal-cat{font-size:13px;font-weight:600;color:var(--text);flex:1;}
.goal-period{font-size:10px;color:var(--muted);background:#f0f0f0;padding:2px 6px;border-radius:8px;white-space:nowrap;}
.goal-vals{font-size:12px;font-weight:700;white-space:nowrap;}
.goal-del{background:none;border:none;cursor:pointer;color:#d1d5db;font-size:13px;padding:2px 5px;border-radius:4px;transition:color 0.15s;font-family:inherit;}
.goal-del:hover{color:var(--red);}
.goal-bar-bg{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:6px;}
.goal-bar-fill{height:100%;border-radius:3px;transition:width 0.4s ease;}

/* ── RECURRING ── */
.recurring-item{display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:8px;background:var(--card);border:1px solid var(--border);margin-bottom:5px;}
.rec-badge{font-size:10px;font-weight:700;padding:2px 6px;border-radius:10px;flex-shrink:0;}

/* ── CHARTS ── */
.chart-wrap{background:var(--card);border-radius:14px;padding:16px;margin-bottom:16px;box-shadow:var(--shadow);}
.chart-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:12px;}
.chart-container{position:relative;height:200px;}

/* ── ANNUAL ── */
.annual-title{font-size:18px;font-weight:800;color:var(--navy);margin-bottom:14px;font-family:Georgia,serif;}
.annual-row{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:10px;background:var(--card);border:1px solid var(--border);margin-bottom:5px;cursor:pointer;transition:background 0.15s;}
.annual-row:hover{background:#f8fafc;}
.annual-row.total-row{background:linear-gradient(135deg,#1e3a5f,#2563eb);border-color:transparent;margin-top:4px;cursor:default;}
.annual-row.total-row:hover{background:linear-gradient(135deg,#1e3a5f,#2563eb);}
.annual-mes{width:62px;font-weight:700;font-size:12px;flex-shrink:0;}
.annual-rec{flex:1;font-size:11px;color:var(--green);}
.annual-desp{flex:1;font-size:11px;color:var(--red);}
.annual-saldo{font-size:12px;font-weight:800;min-width:90px;text-align:right;}

/* ── BANNERS ── */
.backup-warn{background:linear-gradient(135deg,#fff8e7,#ffefc4);border:2px solid var(--yellow);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.backup-warn span{flex:1;font-size:13px;color:#92400e;}
.backup-warn button{background:none;border:none;cursor:pointer;color:#92400e;font-size:18px;line-height:1;}
.install-banner{background:linear-gradient(135deg,#1e3a5f,#1d4ed8);color:#fff;border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:12px;margin-bottom:14px;box-shadow:0 4px 16px rgba(30,58,95,0.2);}
.install-banner .icon{font-size:26px;flex-shrink:0;}
.install-banner .text{flex:1;}
.install-banner .text strong{display:block;font-size:13px;margin-bottom:2px;}
.install-banner .text span{font-size:11px;color:#93c5fd;}
.install-banner .btns{display:flex;gap:6px;flex-direction:column;}
.btn-install{background:#fff;color:var(--navy);border:none;border-radius:8px;padding:7px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;}
.btn-dismiss-install{background:rgba(255,255,255,0.15);color:#fff;border:none;border-radius:8px;padding:7px 10px;font-size:11px;cursor:pointer;font-family:inherit;}
.new-year-banner{background:linear-gradient(135deg,#10b981,#059669);color:#fff;border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.new-year-banner .icon{font-size:26px;flex-shrink:0;}
.new-year-banner .text{flex:1;}
.new-year-banner .text strong{display:block;font-size:13px;margin-bottom:2px;}
.new-year-banner .text span{font-size:11px;color:rgba(255,255,255,0.85);}
.new-year-banner .btns{display:flex;gap:6px;flex-direction:column;}
.btn-newyear{background:#fff;color:#059669;border:none;border-radius:8px;padding:7px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;}
.btn-newyear-skip{background:rgba(255,255,255,0.2);color:#fff;border:none;border-radius:8px;padding:7px 10px;font-size:11px;cursor:pointer;font-family:inherit;}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 12px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;border:1px solid rgba(255,255,255,0.2);transition:opacity 0.15s;font-family:inherit;white-space:nowrap;-webkit-tap-highlight-color:transparent;}
.btn:active{opacity:0.75;}
.btn-ghost{background:rgba(255,255,255,0.15);color:#fff;}
.btn-green{background:rgba(16,185,129,0.85);color:#fff;}
.btn-add{border:none;border-radius:8px;padding:9px 14px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;flex-shrink:0;}
.btn-sm{padding:5px 10px;font-size:11px;border-radius:6px;border:none;cursor:pointer;font-weight:600;font-family:inherit;}
.view-toggle{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.25);color:#fff;border-radius:8px;padding:6px 10px;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;white-space:nowrap;}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;display:flex;align-items:flex-end;justify-content:center;}
.modal{background:#fff;border-radius:20px 20px 0 0;padding:24px 20px max(24px,env(safe-area-inset-bottom));width:100%;max-width:600px;max-height:88vh;overflow-y:auto;}
.modal-title{font-size:16px;font-weight:800;color:var(--text);margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted);padding:2px;}
.form-group{margin-bottom:12px;}
.form-group label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:0.5px;}
.form-group input,.form-group select{width:100%;padding:10px 12px;border-radius:10px;border:1px solid var(--border);font-size:14px;background:#fff;color:var(--text);font-family:inherit;-webkit-appearance:none;}
.form-group input:focus,.form-group select:focus{outline:2px solid var(--blue);border-color:var(--blue);}
.form-row{display:flex;gap:10px;}
.form-row .form-group{flex:1;}

/* ── TOAST ── */
.toast{position:fixed;bottom:max(24px,calc(16px + env(safe-area-inset-bottom)));left:50%;transform:translateX(-50%);color:#fff;padding:10px 18px;border-radius:30px;font-size:13px;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,0.2);display:flex;align-items:center;gap:8px;z-index:999;white-space:nowrap;animation:fadeUp 0.2s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateX(-50%) translateY(8px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}

/* ── DESKTOP SPECIFIC ── */
body.desktop-mode .modal-overlay{align-items:center;}
body.desktop-mode .modal{border-radius:16px;max-height:80vh;}

button:focus-visible{outline:2px solid #3b82f6;outline-offset:2px;}
@media(max-width:420px){.header-title{font-size:16px;}.card-value{font-size:14px;}}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="header-top">
      <div class="header-left">
        <div>
          <div class="header-label">Controle Financeiro</div>
          <div class="header-title">Meu Orçamento</div>
        </div>
        <select class="year-select" id="yearSelect" onchange="changeYear(this.value)"></select>
      </div>
      <div class="header-btns">
        <button class="view-toggle" id="viewToggleBtn" onclick="toggleDesktopMode()" title="Alternar layout">💻 Desktop</button>
        <button class="btn btn-ghost" onclick="importData()">⬆ Importar</button>
        <div style="position:relative;">
          <button class="btn btn-green" onclick="toggleExportMenu(event)">⬇ Exportar ▾</button>
          <div id="exportMenu" style="display:none;position:absolute;right:0;top:calc(100% + 6px);background:#fff;border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,0.15);overflow:hidden;min-width:190px;z-index:300;">
            <button onclick="exportJSON()" style="display:flex;align-items:center;gap:10px;width:100%;padding:12px 16px;border:none;background:none;cursor:pointer;font-size:13px;font-weight:600;color:#1f2937;font-family:inherit;border-bottom:1px solid #f0f0f0;">
              <span style="font-size:18px;">💾</span>
              <div style="text-align:left;"><div>Backup JSON</div><div style="font-size:11px;color:#6b7280;font-weight:400;">Todos os dados e anos</div></div>
            </button>
            <button onclick="exportPDF()" style="display:flex;align-items:center;gap:10px;width:100%;padding:12px 16px;border:none;background:none;cursor:pointer;font-size:13px;font-weight:600;color:#1f2937;font-family:inherit;">
              <span style="font-size:18px;">📄</span>
              <div style="text-align:left;"><div>Relatório PDF</div><div style="font-size:11px;color:#6b7280;font-weight:400;">Resumo do mês ou ano</div></div>
            </button>
          </div>
        </div>
      </div>
    </div>
    <div class="tabs-wrap" id="tabs"></div>
  </div>
</div>

<div class="content" id="content"></div>
<div id="toast" class="toast" style="display:none"></div>
<div class="modal-overlay" id="modal" style="display:none" onclick="closeModalOutside(event)">
  <div class="modal" id="modalContent"></div>
</div>

<script>
// ── CONSTANTS ─────────────────────────────────────────────────────────────────
const MESES       = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
const MESES_SHORT = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
const SEMANAS     = ["1ª Semana","2ª Semana","3ª Semana","4ª Semana","5ª Semana"];
const CAT_REC     = ["Ajuda de Custo","Aluguel","Benefícios","Comissão","Freelancer/Autônomo","Salário / Aposentadoria","Serviços","Uber/App","Vale","Vendas","Outros"];
const CAT_DESP    = ["Água","Aluguel","Cartão de Crédito","Combustíveis","Dízimo","Educação","Farmácia","Gás","Imposto","Internet","Lazer","Luz","Manutenção","Mercado","Oferta","Primícias","Saúde","Streamers/Assinaturas","Telefone","Transporte","Investimentos","Outros"];
const STORAGE_PREFIX      = "controle_fin_year_";
const META_KEY            = "controle_fin_meta";
const BACKUP_KEY          = "controle_fin_backup_date";
const DISMISS_INSTALL_KEY = "controle_fin_install_dismissed";
const DISMISS_NEWYEAR_KEY = "controle_fin_newyear_dismissed_";
const DESKTOP_KEY         = "controle_fin_desktop";

// ── STATE ─────────────────────────────────────────────────────────────────────
let deferredPrompt = null;
let chartBar = null, chartPie = null;
let state = {
  view: "month",
  activeMonth: new Date().getMonth(),
  activeYear: new Date().getFullYear(),
  data: null,
  meta: loadMeta(),
  backupDismissed: false,
  installDismissed: !!localStorage.getItem(DISMISS_INSTALL_KEY),
  desktopMode: localStorage.getItem(DESKTOP_KEY) === "1",
};
state.data = loadYearData(state.activeYear);
applyDesktopMode();

// ── META ──────────────────────────────────────────────────────────────────────
function loadMeta(){
  try{
    const r=localStorage.getItem(META_KEY);
    if(r){
      const m=JSON.parse(r);
      if(m.goals && !Array.isArray(m.goals)){
        m.goals=Object.entries(m.goals).map(([categoria,limite])=>({categoria,limite,mesInicio:0,mesFim:11}));
      }
      if(!m.goals) m.goals=[];
      if(!m.recurring) m.recurring=[];
      if(!m.years) m.years=[new Date().getFullYear()];
      return m;
    }
  }catch{}
  return { years:[new Date().getFullYear()], goals:[], recurring:[] };
}
function saveMeta(){ try{localStorage.setItem(META_KEY,JSON.stringify(state.meta));}catch{} }
function ensureYear(y){
  if(!state.meta.years.includes(y)){ state.meta.years.push(y); state.meta.years.sort((a,b)=>b-a); saveMeta(); }
}

// ── YEAR DATA ─────────────────────────────────────────────────────────────────
function emptyMonth(){ return {receitas:[],despesas:[],saldoAnterior:""}; }
function initYearData(){ return Array.from({length:12},emptyMonth); }
function loadYearData(y){
  try{ const r=localStorage.getItem(STORAGE_PREFIX+y); if(r) return JSON.parse(r); }catch{}
  return initYearData();
}
function saveYearData(){ try{localStorage.setItem(STORAGE_PREFIX+state.activeYear,JSON.stringify(state.data));}catch{} }
function changeYear(y){ state.activeYear=parseInt(y); state.data=loadYearData(state.activeYear); state.view="month"; state.activeMonth=0; render(); }

// ── HELPERS ───────────────────────────────────────────────────────────────────
function fmt(v){ return new Intl.NumberFormat("pt-BR",{style:"currency",currency:"BRL"}).format(v||0); }
function parseVal(s){ return parseFloat(String(s||"").replace(/[^\d,.\-]/g,"").replace(",","."))||0; }
function calcMonth(m){
  const fixedRec=(state.meta.recurring||[]).filter(r=>r.tipo==="rec").reduce((a,r)=>a+parseVal(r.valor),0);
  const fixedDesp=(state.meta.recurring||[]).filter(r=>r.tipo==="desp").reduce((a,r)=>a+parseVal(r.valor),0);
  const rec=m.receitas.reduce((a,r)=>a+parseVal(r.valor),0)+fixedRec;
  const desp=m.despesas.reduce((a,r)=>a+parseVal(r.valor),0)+fixedDesp;
  return {rec,desp,saldo:parseVal(m.saldoAnterior)+rec-desp};
}
function uid(){ return Date.now()+"_"+Math.random().toString(36).slice(2); }
function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;"); }

// ── DESKTOP MODE ──────────────────────────────────────────────────────────────
function applyDesktopMode(){
  document.body.classList.toggle("desktop-mode", state.desktopMode);
  const btn = document.getElementById("viewToggleBtn");
  if(btn) btn.textContent = state.desktopMode ? "📱 Mobile" : "💻 Desktop";
}
function toggleDesktopMode(){
  state.desktopMode = !state.desktopMode;
  localStorage.setItem(DESKTOP_KEY, state.desktopMode?"1":"0");
  applyDesktopMode();
  render();
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg,type){
  const el=document.getElementById("toast");
  el.style.display="flex"; el.style.background=type==="error"?"#ef4444":"#10b981";
  el.textContent=(type==="error"?"✕ ":"✓ ")+msg;
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>{el.style.display="none";},3000);
}

function importData(){
  const input=document.createElement("input"); input.type="file"; input.accept=".json";
  input.onchange=e=>{
    const file=e.target.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const p=JSON.parse(ev.target.result);
        if(p.anos&&p.meta){ state.meta=p.meta; saveMeta(); Object.entries(p.anos).forEach(([y,d])=>localStorage.setItem(STORAGE_PREFIX+y,JSON.stringify(d))); state.data=loadYearData(state.activeYear); showToast("Dados importados!"); }
        else if(p.meses&&Array.isArray(p.meses)&&p.meses.length===12){ localStorage.setItem(STORAGE_PREFIX+state.activeYear,JSON.stringify(p.meses)); state.data=loadYearData(state.activeYear); showToast("Importado (formato antigo)!"); }
        else{ showToast("Arquivo inválido.","error"); return; }
        render();
      }catch{ showToast("Erro ao ler arquivo.","error"); }
    };
    reader.readAsText(file);
  };
  input.click();
}

  const note=document.getElementById("note-"+tipo)?.value||"";

    const desps=state.data.map(m=>calcMonth(m).desp);
    if(chartBar) chartBar.destroy();
    chartBar=new Chart(barEl,{type:"bar",data:{labels:MESES_SHORT,datasets:[{label:"Receitas",data:recs,backgroundColor:"rgba(16,185,129,0.7)",borderRadius:4},{label:"Despesas",data:desps,backgroundColor:"rgba(239,68,68,0.7)",borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:"#6b7280",font:{size:11}}}},scales:{x:{ticks:{color:"#6b7280",font:{size:10}},grid:{color:"#f0f0f0"}},y:{ticks:{color:"#6b7280",font:{size:10},callback:v=>fmt(v)},grid:{color:"#f0f0f0"}}}}});
  }
  const pieEl=document.getElementById("chartPie");
  const pieWrap=document.getElementById("pieWrap");
  if(pieEl){
    const m=state.data[state.activeMonth]; const byCat={};
    m.despesas.forEach(d=>{byCat[d.categoria]=(byCat[d.categoria]||0)+parseVal(d.valor);});
    (state.meta.recurring||[]).filter(r=>r.tipo==="desp").forEach(r=>{byCat[r.categoria]=(byCat[r.categoria]||0)+parseVal(r.valor);});
    const sorted=Object.entries(byCat).sort((a,b)=>b[1]-a[1]).slice(0,8);
    if(chartPie) chartPie.destroy();
    if(sorted.length){
      if(pieWrap) pieWrap.style.display="block";
      const colors=["#ef4444","#f97316","#f59e0b","#10b981","#3b82f6","#8b5cf6","#ec4899","#6b7280"];
      chartPie=new Chart(pieEl,{type:"doughnut",data:{labels:sorted.map(e=>e[0]),datasets:[{data:sorted.map(e=>e[1]),backgroundColor:colors,borderWidth:2,borderColor:"#fff"}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:"right",labels:{color:"#6b7280",font:{size:10},boxWidth:12}}}}});
    } else {
      if(pieWrap) pieWrap.style.display="none";
    }
  }
}

// ── RENDER MONTH ──────────────────────────────────────────────────────────────
function renderMonth(){
  const mData=state.data[state.activeMonth];
  const recEl=document.getElementById("lancs-rec");
  const despEl=document.getElementById("lancs-desp");
  if(recEl) recEl.innerHTML=lancsHTML(mData.receitas,"rec","#10b981");
  if(despEl) despEl.innerHTML=lancsHTML(mData.despesas,"desp","#ef4444");
}

function monthHTML(){
  const mData=state.data[state.activeMonth];
  const {rec,desp,saldo}=calcMonth(mData);
  const isDesktop=state.desktopMode;

  const topBar=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px;">
      <div class="month-title" style="margin-bottom:0">${MESES[state.activeMonth]} · ${state.activeYear}</div>
      <div style="display:flex;gap:6px;">
        <button class="btn-sm" onclick="openGoalsModal()" style="background:#8b5cf622;color:#8b5cf6;">🎯 Metas</button>
        <button class="btn-sm" onclick="openRecurringModal()" style="background:#6366f122;color:#6366f1;">🔁 Fixos</button>
      </div>
    </div>
    <div class="saldo-ant">
      <label>Saldo anterior:</label>
      <input type="number" min="0" step="0.01" placeholder="R$ 0,00" value="${mData.saldoAnterior||""}" oninput="setSaldoAnt(this.value)" inputmode="decimal"/>
    </div>
    <div class="cards" id="summary-cards">
      ${cardHTML("Receitas",rec,"#10b981","")}${cardHTML("Despesas",desp,"#ef4444","")}
      ${cardHTML("Saldo",saldo,saldo>=0?"#3b82f6":"#f59e0b",saldo<0?"⚠ Saldo negativo":"✓ Saldo positivo")}
    </div>
    ${goalsHTML()}`;

  if(isDesktop){
    const pieSection=`<div class="chart-wrap" id="pieWrap" style="display:none"><div class="chart-title">Despesas por Categoria</div><div class="chart-container"><canvas id="chartPie"></canvas></div></div>`;
    return `${topBar}
      ${pieSection}
      <div class="desktop-grid">
        <div>
          <div class="section-title" style="color:#10b981;border-bottom:2px solid #10b98122">Receitas</div>
          ${addFormHTML("rec","#10b981","#f0fdf4","#bbf7d0")}
          <div id="lancs-rec">${lancsHTML(mData.receitas,"rec","#10b981")}</div>
        </div>
        <div>
          <div class="section-title" style="color:#ef4444;border-bottom:2px solid #ef444422">Despesas</div>
          ${addFormHTML("desp","#ef4444","#fff5f5","#fecaca")}
          <div id="lancs-desp">${lancsHTML(mData.despesas,"desp","#ef4444")}</div>
        </div>
      </div>`;
  }

  // Mobile layout
  return `${topBar}
    <div class="chart-wrap" id="pieWrap" style="display:none"><div class="chart-title">Despesas por Categoria</div><div class="chart-container"><canvas id="chartPie"></canvas></div></div>
    <div class="section-title" style="color:#10b981;border-bottom:2px solid #10b98122">Receitas</div>
    ${addFormHTML("rec","#10b981","#f0fdf4","#bbf7d0")}
    <div id="lancs-rec">${lancsHTML(mData.receitas,"rec","#10b981")}</div>
    <div style="height:18px"></div>
    <div class="section-title" style="color:#ef4444;border-bottom:2px solid #ef444422">Despesas</div>
    ${addFormHTML("desp","#ef4444","#fff5f5","#fecaca")}
    <div id="lancs-desp">${lancsHTML(mData.despesas,"desp","#ef4444")}</div>`;
}

function annualHTML(){
  let tR=0,tD=0;
  const rows=MESES.map((mes,i)=>{
    const {rec,desp,saldo}=calcMonth(state.data[i]); tR+=rec; tD+=desp;
    const hasData=rec>0||desp>0;
    return `<div class="annual-row" style="opacity:${hasData?1:0.4}" onclick="setTab('month',${i})">
      <div class="annual-mes" style="color:var(--navy)">${mes.slice(0,3).toUpperCase()}</div>
      <div class="annual-rec">Rec: ${fmt(rec)}</div>
      <div class="annual-desp">Desp: ${fmt(desp)}</div>
      <div class="annual-saldo" style="color:${saldo>=0?"#3b82f6":"#f59e0b"}">${fmt(saldo)}</div>
    </div>`;
  }).join("");
  const ts=tR-tD;
  return `
    <div class="annual-title">Resumo ${state.activeYear}</div>
    <div class="chart-wrap"><div class="chart-title">Receitas × Despesas por Mês</div><div class="chart-container"><canvas id="chartBar"></canvas></div></div>
    ${rows}
    <div class="annual-row total-row">
      <div class="annual-mes" style="color:#fff;font-size:11px">TOTAL</div>
      <div class="annual-rec" style="color:#86efac;font-weight:700">Rec: ${fmt(tR)}</div>
      <div class="annual-desp" style="color:#fca5a5;font-weight:700">Desp: ${fmt(tD)}</div>
      <div class="annual-saldo" style="color:${ts>=0?"#34d399":"#fbbf24"}">${fmt(ts)}</div>
    </div>`;
}

function installBannerHTML(){
  if(state.installDismissed) return "";
  const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent)&&!window.MSStream;
  const isStandalone=window.matchMedia("(display-mode: standalone)").matches||navigator.standalone;
  if(isStandalone) return "";
  if(isIOS) return `<div class="install-banner"><div class="icon">📲</div><div class="text"><strong>Instalar como app</strong><span>Compartilhar → Adicionar à Tela de Início</span></div><div class="btns"><button class="btn-dismiss-install" onclick="dismissInstall()">✕</button></div></div>`;
  if(deferredPrompt) return `<div class="install-banner"><div class="icon">📲</div><div class="text"><strong>Instalar como app</strong><span>Funciona offline na tela inicial</span></div><div class="btns"><button class="btn-install" onclick="triggerInstall()">Instalar</button><button class="btn-dismiss-install" onclick="dismissInstall()">Agora não</button></div></div>`;
  return "";
}
function newYearBannerHTML(){
  if(!shouldShowNewYear()) return "";
  const y=new Date().getFullYear();
  return `<div class="new-year-banner"><div class="icon">🎉</div><div class="text"><strong>Novo ano, nova planilha!</strong><span>Criar ${y} com saldo final de ${y-1} como saldo inicial?</span></div><div class="btns"><button class="btn-newyear" onclick="createNewYear()">Criar ${y}</button><button class="btn-newyear-skip" onclick="dismissNewYear()">Depois</button></div></div>`;
}

// ── MAIN RENDER ───────────────────────────────────────────────────────────────
function render(){
  renderYearSelect();
  const tabsEl=document.getElementById("tabs");
  let t=`<button class="tab ${state.view==="annual"?"active":""}" onclick="setTab('annual')">📊 Resumo</button>`;
  MESES_SHORT.forEach((m,i)=>{ t+=`<button class="tab ${state.view==="month"&&state.activeMonth===i?"active":""}" onclick="setTab('month',${i})">${m}</button>`; });
  tabsEl.innerHTML=t;

  let html=installBannerHTML()+newYearBannerHTML();
  if(shouldWarnBackup()) html+=`<div class="backup-warn"><span>⚠️ <strong>Lembrete:</strong> Você não faz backup há mais de 7 dias!</span><button onclick="dismissBackup()">✕</button></div>`;
  html+=state.view==="annual"?annualHTML():monthHTML();
  document.getElementById("content").innerHTML=html;
  const btn=document.getElementById("viewToggleBtn");
  if(btn) btn.textContent=state.desktopMode?"📱 Mobile":"💻 Desktop";
  setTimeout(renderCharts,50);
}

// ── SW ────────────────────────────────────────────────────────────────────────
if("serviceWorker" in navigator){ window.addEventListener("load",()=>{ navigator.serviceWorker.register("sw.js").catch(()=>{}); }); }

// ── INIT ──────────────────────────────────────────────────────────────────────
ensureYear(state.activeYear);
render();
</script>
</body>
</html>
